name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Extract and Fix Paths
        run: |
          # 1. فك ضغط الملف
          unzip RifiElHoudane_V4.zip
          
          # 2. البحث عن المجلد الذي يحتوي على ملف settings.gradle ونقل محتوياته للمسار الرئيسي
          PROJECT_ROOT=$(find . -name "settings.gradle" -exec dirname {} \;)
          if [ "$PROJECT_ROOT" != "." ]; then
            cp -r $PROJECT_ROOT/* .
          fi

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Rifi-El-Houdane-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          
